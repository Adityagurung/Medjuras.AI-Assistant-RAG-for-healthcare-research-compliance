apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    uid: medjuras-pg
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1300
    isDefault: true
    editable: true

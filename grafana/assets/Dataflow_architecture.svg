<?xml version="1.0" encoding="UTF-8"?>
<svg width="980" height="1220" viewBox="0 0 980 1220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { --bg:#ffffff; --fg:#111; --muted:#666; --box:#f7f7f7; --line:#2b7cff; --opt:#9c27b0; --db:#2e7d32; --obs:#ff6d00; }
      text{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:16px;fill:var(--fg)}
      .title{font-weight:600}
      .box{fill:var(--box); stroke:#ddd; stroke-width:1.25; rx:14; ry:14}
      .arrow{fill:none; stroke:var(--line); stroke-width:3; marker-end:url(#arrowhead)}
      .arrow.opt{stroke:var(--opt)}
      .arrow.db{stroke:var(--db)}
      .arrow.obs{stroke:var(--obs)}
      /* marching-ants “flow” effect */
      .flow{
        stroke-dasharray:7 8;
        animation: dash 1.4s linear infinite;
      }
      @keyframes dash{ to{ stroke-dashoffset:-150; } }
      .small{font-size:14px; fill:var(--muted)}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="100%" height="100%" fill="var(--bg)"/>

  <!-- Column x position helpers -->
  <!-- main center line at x=490 -->

  <!-- 1) User -->
  <g transform="translate(370,40)">
    <rect class="box" width="240" height="60"/>
    <text x="120" y="36" text-anchor="middle" class="title">User</text>
  </g>
  <path class="arrow flow" d="M490,100 L490,150"/>

  <!-- 2) Streamlit UI -->
  <g transform="translate(330,150)">
    <rect class="box" width="320" height="70"/>
    <text x="160" y="42" text-anchor="middle" class="title">Streamlit UI</text>
  </g>
  <path class="arrow flow" d="M490,220 L490,280"/>

  <!-- 3) LLM / Agentic Router -->
  <g transform="translate(280,280)">
    <rect class="box" width="420" height="80"/>
    <text x="210" y="48" text-anchor="middle" class="title">LLM / Agentic Router</text>
  </g>
  <path class="arrow flow" d="M490,360 L490,430"/>

  <!-- 4) Hybrid Tool (FIRST) -->
  <g transform="translate(250,430)">
    <rect class="box" width="480" height="180"/>
    <text x="240" y="38" text-anchor="middle" class="title">Hybrid Tool (FIRST)</text>

    <!-- Branch labels -->
    <g transform="translate(40,70)">
      <rect class="box" width="180" height="60"/>
      <text x="90" y="38" text-anchor="middle">Elasticsearch</text>
    </g>
    <g transform="translate(260,70)">
      <rect class="box" width="180" height="60"/>
      <text x="90" y="38" text-anchor="middle">Qdrant</text>
    </g>

    <!-- small animated lines from hub to each tool -->
    <circle cx="240" cy="70" r="4" fill="var(--line)"/>
    <path class="arrow flow" d="M240,70 L130,70"/>
    <path class="arrow flow" d="M240,70 L350,70"/>
  </g>

  <!-- Arrow down from Hybrid block -->
  <path class="arrow flow" d="M490,610 L490,680"/>

  <!-- 5) Optional tools -->
  <g transform="translate(230,680)">
    <rect class="box" width="520" height="110"/>
    <text x="260" y="40" text-anchor="middle" class="title">(Optional) Wikipedia Tool</text>
    <text x="260" y="72" text-anchor="middle" class="title">(Optional) PubMed Tool</text>
  </g>
  <path class="arrow flow" d="M490,790 L490,860"/>

  <!-- 6) LLM Synthesis -->
  <g transform="translate(260,860)">
    <rect class="box" width="460" height="80"/>
    <text x="230" y="48" text-anchor="middle" class="title">LLM Synthesis (grounded answer)</text>
  </g>
  <path class="arrow flow" d="M490,940 L490,1010"/>

  <!-- 7) Streamlit render -->
  <g transform="translate(230,1010)">
    <rect class="box" width="520" height="90"/>
    <text x="260" y="40" text-anchor="middle" class="title">Streamlit (renders answer + citations)</text>
  </g>
  <path class="arrow flow" d="M490,1100 L490,1170"/>

  <!-- 8) User Feedback -->
  <g transform="translate(220,1170)">
    <rect class="box" width="540" height="100"/>
    <text x="270" y="44" text-anchor="middle" class="title">User Feedback (thumbs up/down, notes)</text>
  </g>

  <!-- Branch to PostgreSQL -->
  <path class="arrow db flow" d="M490,1270 C490,1300 490,1300 490,1330"/>
  <g transform="translate(320,1330)">
    <rect class="box" width="340" height="78"/>
    <text x="170" y="46" text-anchor="middle" class="title">PostgreSQL (feedback table)</text>
  </g>

  <!-- From PostgreSQL to Grafana -->
  <path class="arrow obs flow" d="M490,1408 C490,1438 490,1438 490,1468"/>
  <g transform="translate(240,1468)">
    <rect class="box" width="500" height="90"/>
    <text x="250" y="50" text-anchor="middle" class="title">Grafana (visualize ratings, CTR, QA health)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(650,40)">
    <rect class="box" width="290" height="110"/>
    <text x="14" y="30" class="small">—</text>
    <path class="arrow flow" d="M26,26 L86,26"/>
    <text x="98" y="30" class="small">Main flow</text>

    <path class="arrow db flow" d="M14,56 L86,56"/>
    <text x="98" y="60" class="small">Data to DB</text>

    <path class="arrow obs flow" d="M14,86 L86,86"/>
    <text x="98" y="90" class="small">Observability</text>
  </g>
</svg>
